<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de Cadastro</title>
    <link rel="stylesheet" type="text/css" href="css/fomulario.css">
</head>
<body>
    <div class="contorno">
    <h1>Ficha Cadastral</h1>
    <p>Preencha os campos abaixo com suas informações para se cadastrar em nosso banco de talentos!</p>
    <p>É importante que nenhum campo fique em branco para facilitar nosso contato com você.</p>
    <input type="text" id="nomeDigitado" placeholder="Nome"><br><br>
    <input type="text" id="emailDigitado" placeholder="E-mail"><br><br>
    <input type="text" id="enderecoDigitado" placeholder="Endereço"><br><br>
    <button onclick="cadastrar()">Cadastrar</button>
    </div>
    <script src="js/formulario.js"></script>
</body>
</html>
