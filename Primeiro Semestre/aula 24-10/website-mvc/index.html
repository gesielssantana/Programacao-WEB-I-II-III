<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tela de Login</title>

    <script src="./js/index.js"></script>

</head>
<body>
    <div class="container-principal">
        <div class="formulario">
            <form>
                <input type="email" placeholder="Digite seu e-mail:" id="emailDigitado" required="true" minlength="5"/>

                <input type="password" placeholder="Digite sua senha:" id="senhaDigitada" required="true" minlength="5"/>

                <input type="submit" value="Entrar" onclick="logar(); return false"/>
            </form>
        </div>
    </div>
</body>
</html>
